name: flutter_video
description: "A cross-platform media player with Netflix-style UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1

  # Phase 2 — Database & library scanning
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  watcher: ^1.1.1

  # Phase 3 — Video Playback
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.4
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Phase 2 — Drift code generation
  drift_dev: ^2.33.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
