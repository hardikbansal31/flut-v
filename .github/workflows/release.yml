name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libmpv-dev mpv dpkg-dev

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux Release
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            flutter build linux --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}
          else
            flutter build linux --release
          fi

      - name: Package as .deb
        run: |
          APP_NAME="penguin"
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          fi
          APP_VERSION="${TAG#v}"
          DEB_DIR="deb_build/${APP_NAME}_${APP_VERSION}"

          mkdir -p ${DEB_DIR}/DEBIAN
          mkdir -p ${DEB_DIR}/usr/lib/${APP_NAME}
          mkdir -p ${DEB_DIR}/usr/bin
          mkdir -p ${DEB_DIR}/usr/share/applications
          mkdir -p ${DEB_DIR}/usr/share/doc/${APP_NAME}

          cp -r build/linux/x64/release/bundle/* \
            ${DEB_DIR}/usr/lib/${APP_NAME}/

          cp LICENSE ${DEB_DIR}/usr/share/doc/${APP_NAME}/copyright

          cat > ${DEB_DIR}/usr/bin/${APP_NAME} << EOF
          #!/bin/bash
          exec /usr/lib/${APP_NAME}/${APP_NAME} "\$@"
          EOF
          chmod +x ${DEB_DIR}/usr/bin/${APP_NAME}

          cat > ${DEB_DIR}/usr/share/applications/${APP_NAME}.desktop << EOF
          [Desktop Entry]
          Name=Penguin
          Exec=/usr/lib/${APP_NAME}/${APP_NAME}
          Icon=/usr/lib/${APP_NAME}/data/flutter_assets/assets/icon/icon.png
          Type=Application
          Categories=AudioVideo;Player;
          EOF

          cat > ${DEB_DIR}/DEBIAN/control << EOF
          Package: ${APP_NAME}
          Version: ${APP_VERSION}
          Architecture: amd64
          Maintainer: Hardik Bansal <hardikbansal31@gmail.com>
          Description: A cross-platform Netflix-style media player
          EOF

          dpkg-deb --build ${DEB_DIR}

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: deb_build/*.deb

  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true
          pub-cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set Version in installer.iss
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.version }}"
          }
          $version = $tag -replace '^v', ''
          (Get-Content installer.iss) -replace 'AppVersion=1.0.0', "AppVersion=$version" | Set-Content installer.iss

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Compile Inno Setup Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/Penguin_Installer.exe

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: artifacts

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Set Release Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          files: |
            artifacts/*.deb
            artifacts/Penguin_Installer.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}